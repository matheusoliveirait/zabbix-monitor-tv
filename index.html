<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zabbix Monitor TV - Monitoramento de Infraestrutura</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="tv">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M3 12h4l2-6 4 12 2-6h6" />
          </svg>
        </div>
        <h1>Monitoramento de Infraestrutura</h1>
      </div>

      <div class="top-right">
        <div class="clock">
          <div class="clock-time" id="clockTime">--:--:--</div>
          <div class="clock-date" id="clockDate">--/--/----</div>
        </div>
        <div class="header-hint">F2 configuracoes</div>
        <div class="utility-actions">
          <button class="icon-button" id="refreshButton" type="button" title="Atualizar agora" aria-label="Atualizar agora">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M21 12a9 9 0 0 1-15.4 6.4L3 16" />
              <path d="M3 21v-5h5" />
              <path d="M3 12A9 9 0 0 1 18.4 5.6L21 8" />
              <path d="M21 3v5h-5" />
            </svg>
          </button>
          <button class="icon-button" id="settingsButton" type="button" title="Configurar API" aria-label="Configurar API">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
              <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.06.06a2.1 2.1 0 1 1-2.97 2.97l-.06-.06a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.1 1.65V21a2.1 2.1 0 1 1-4.2 0v-.09a1.8 1.8 0 0 0-1.18-1.65 1.8 1.8 0 0 0-1.98.36l-.06.06a2.1 2.1 0 1 1-2.97-2.97l.06-.06A1.8 1.8 0 0 0 4.6 15a1.8 1.8 0 0 0-1.65-1.1H2.8a2.1 2.1 0 1 1 0-4.2h.09A1.8 1.8 0 0 0 4.54 8.5a1.8 1.8 0 0 0-.36-1.98l-.06-.06a2.1 2.1 0 1 1 2.97-2.97l.06.06a1.8 1.8 0 0 0 1.98.36h.08A1.8 1.8 0 0 0 10.4 2.3V2.1a2.1 2.1 0 1 1 4.2 0v.09a1.8 1.8 0 0 0 1.1 1.65 1.8 1.8 0 0 0 1.98-.36l.06-.06a2.1 2.1 0 1 1 2.97 2.97l-.06.06a1.8 1.8 0 0 0-.36 1.98v.08a1.8 1.8 0 0 0 1.65 1.1h.16a2.1 2.1 0 1 1 0 4.2h-.09A1.8 1.8 0 0 0 19.4 15Z" />
            </svg>
          </button>
          <button class="icon-button" id="fullscreenButton" type="button" title="Entrar em tela cheia" aria-label="Entrar em tela cheia" aria-pressed="false">
            <svg class="icon fullscreen-enter-icon" viewBox="0 0 24 24">
              <path d="M8 3H3v5" />
              <path d="M16 3h5v5" />
              <path d="M8 21H3v-5" />
              <path d="M16 21h5v-5" />
            </svg>
            <svg class="icon fullscreen-exit-icon" viewBox="0 0 24 24">
              <path d="M3 8h5V3" />
              <path d="M21 8h-5V3" />
              <path d="M3 16h5v5" />
              <path d="M21 16h-5v5" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <section class="summary" aria-label="Resumo operacional">
      <article class="card total-card" id="totalCard">
        <div class="card-label">Incidentes ativos</div>
        <div class="card-number" id="totalProblems">0</div>
        <div class="card-note" id="totalNote">Aguardando dados</div>
      </article>

      <article class="card" data-severity="5">
        <div class="card-label">Desastre</div>
        <div class="card-number" id="countDisaster">0</div>
        <div class="card-note" id="noteDisaster">Sem incidente</div>
      </article>

      <article class="card" data-severity="4">
        <div class="card-label">Alta</div>
        <div class="card-number" id="countHigh">0</div>
        <div class="card-note" id="noteHigh">Sem incidente</div>
      </article>

      <article class="card" data-severity="3">
        <div class="card-label">Media</div>
        <div class="card-number" id="countAverage">0</div>
        <div class="card-note" id="noteAverage">Sem incidente</div>
      </article>

      <article class="card" data-severity="2">
        <div class="card-label">Atencao</div>
        <div class="card-number" id="countWarning">0</div>
        <div class="card-note" id="noteWarning">Sem incidente</div>
      </article>
    </section>

    <main class="incidents">
      <div class="panel-head">
        <div class="panel-title">
          <h2>Incidentes ativos <span class="page-title" id="pageTitle"></span></h2>
          <div class="panel-subtitle" id="panelSubtitle">Aguardando atualizacao</div>
        </div>
        <div class="status-pill" id="statusPill">Sem dados</div>
      </div>

      <div class="table-head">
        <button class="sort-button" type="button" data-sort-mode="recent">Hora</button>
        <button class="sort-button" type="button" data-sort-mode="severity">Criticidade</button>
        <button class="sort-button" type="button" data-sort-mode="client">Cliente / Host</button>
        <button class="sort-button" type="button" data-sort-mode="problem">Problema</button>
        <button class="sort-button" type="button" data-sort-mode="duration">Duracao</button>
      </div>

      <div class="problem-list" id="problemList"></div>
    </main>

    <footer class="footer">
      <div class="footer-status" id="footerStatus">Aguardando configuracao</div>
      <div>Zabbix Monitor TV</div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
