<VirtualHost *:{{PORT}}>
    ServerName {{SERVER_NAME}}
    DocumentRoot "{{INSTALL_DIR}}"
    DirectoryIndex index.php

    <Directory "{{INSTALL_DIR}}">
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    <Directory "{{INSTALL_DIR}}/config">
        Require all denied
    </Directory>
    <Directory "{{INSTALL_DIR}}/database">
        Require all denied
    </Directory>
    <Directory "{{INSTALL_DIR}}/deploy">
        Require all denied
    </Directory>
    <Directory "{{INSTALL_DIR}}/includes">
        Require all denied
    </Directory>
    <Directory "{{INSTALL_DIR}}/work">
        Require all denied
    </Directory>
    <Directory "{{INSTALL_DIR}}/outputs">
        Require all denied
    </Directory>
    <Directory "{{INSTALL_DIR}}/backups">
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/central-incidentes-error.log
    CustomLog ${APACHE_LOG_DIR}/central-incidentes-access.log combined
</VirtualHost>
