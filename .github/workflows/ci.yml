name: Validar projeto

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  linux:
    name: PHP, JavaScript e instalador Linux
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v5

      - name: Preparar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: curl, mbstring, openssl, pdo_mysql
          coverage: none

      - name: Validar PHP
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find . -type f -name '*.php' -not -path './work/*' -print0)

      - name: Validar JavaScript
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find . -type f -name '*.js' -not -path './work/*' -print0)

      - name: Validar e testar Bash
        shell: bash
        run: |
          set -euo pipefail
          bash -n install.sh
          bash tests/install-linux.tests.sh

  windows:
    name: Instalador Windows
    runs-on: windows-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v5

      - name: Validar PowerShell
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "./install-windows.ps1"),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Testar instalador Windows
        shell: powershell
        run: .\tests\install-windows.tests.ps1
